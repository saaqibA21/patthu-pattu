<!DOCTYPE html>
<html lang="ta">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>பத்து பாட்டு - பாடல் வரிகள் | Pathu Pattu Lyrics</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Text:ital@0;1&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Text', serif;
            background: linear-gradient(135deg, #FBF8F3 0%, #F5E6D3 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem;
            background: linear-gradient(135deg, #4A1A1A 0%, #8B4513 100%);
            border-radius: 20px;
            color: white;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .lang-toggle {
            margin-top: 1rem;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 0.5rem 1.5rem;
            margin: 0 0.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: white;
            color: #4A1A1A;
        }

        .songs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .song-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 5px solid #B8860B;
        }

        .song-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .song-number {
            background: linear-gradient(135deg, #B8860B 0%, #FFD700 100%);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-bottom: 1rem;
            font-family: 'Poppins', sans-serif;
        }

        .song-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #4A1A1A;
            margin-bottom: 0.5rem;
        }

        .song-poet {
            color: #666;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .song-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .meta-tag {
            background: #F0E6D3;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.85rem;
            color: #4A1A1A;
        }

        .lyrics-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-y: auto;
        }

        .lyrics-modal.active {
            display: flex;
        }

        .lyrics-content {
            background: white;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 20px;
            position: relative;
        }

        .lyrics-header {
            background: linear-gradient(135deg, #4A1A1A 0%, #8B4513 100%);
            color: white;
            padding: 2rem;
            border-radius: 20px 20px 0 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        .lyrics-body {
            padding: 2rem;
        }

        .lyrics-section {
            margin-bottom: 2rem;
        }

        .lyrics-section h3 {
            font-family: 'Playfair Display', serif;
            color: #4A1A1A;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            border-bottom: 3px solid #B8860B;
            padding-bottom: 0.5rem;
        }

        .lyrics-text {
            background: #FBF8F3;
            padding: 2rem;
            border-radius: 10px;
            border-left: 4px solid #B8860B;
            line-height: 2;
            font-size: 1.1rem;
            white-space: pre-wrap;
            color: #333;
        }

        .verse-item {
            background: #F9F5F0;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 10px;
            border-left: 4px solid #FFD700;
        }

        .verse-number {
            background: linear-gradient(135deg, #B8860B 0%, #FFD700 100%);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin-right: 1rem;
            font-family: 'Poppins', sans-serif;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px solid #E0E0E0;
        }

        .action-btn {
            background: linear-gradient(135deg, #B8860B 0%, #FFD700 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 25px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(184, 134, 11, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(184, 134, 11, 0.5);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .songs-grid {
                grid-template-columns: 1fr;
            }

            .lyrics-content {
                margin: 0;
                max-height: 100vh;
                border-radius: 0;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>பத்து பாட்டு - பாடல் வரிகள்</h1>
            <p class="subtitle">Pathu Pattu - Song Lyrics</p>
            <div class="lang-toggle">
                <button class="lang-btn active" data-lang="ta" onclick="switchLanguage('ta')">தமிழ்</button>
                <button class="lang-btn" data-lang="en" onclick="switchLanguage('en')">English</button>
            </div>
        </header>

        <div class="songs-grid" id="songsGrid">
            <!-- Songs will be loaded here -->
        </div>
    </div>

    <!-- Lyrics Modal -->
    <div class="lyrics-modal" id="lyricsModal">
        <div class="lyrics-content">
            <div class="lyrics-header">
                <button class="close-btn" onclick="closeLyrics()">✕</button>
                <h2 id="modalTitle">Song Title</h2>
                <p id="modalPoet">Poet Name</p>
            </div>
            <div class="lyrics-body" id="lyricsBody">
                <!-- Lyrics content will be loaded here -->
            </div>
        </div>
    </div>

    <script src="pathu_pattu_texts.js"></script>
    <script>
        let currentLang = 'ta';

        // Books data
        const booksData = [
            { id: 1, titleTa: "திருமுருகாற்றுப்படை", titleEn: "Thirumurugaatruppadai", poetTa: "நக்கீரர்", poetEn: "Nakkeerar", lines: 317 },
            { id: 2, titleTa: "பொருநராற்றுப்படை", titleEn: "Porunararruppadai", poetTa: "முதத்தாமக்கன்னியார்", poetEn: "Mudathama Kanniyar", lines: 248 },
            { id: 3, titleTa: "சிறுபணாற்றுப்படை", titleEn: "Sirupanarruppadai", poetTa: "நத்தத்தனார்", poetEn: "Nattattanar", lines: 269 },
            { id: 4, titleTa: "பெரும்பணாற்றுப்படை", titleEn: "Perumpanarruppadai", poetTa: "உருத்திரங்கண்ணனார்", poetEn: "Uruthirankannanar", lines: 500 },
            { id: 5, titleTa: "முல்லைப்பாட்டு", titleEn: "Mullaipattu", poetTa: "நப்பூதனார்", poetEn: "Napputanar", lines: 103 },
            { id: 6, titleTa: "நெடுனளவாடை", titleEn: "Nedunalvadai", poetTa: "நக்கீரர்", poetEn: "Nakkeerar", lines: 188 },
            { id: 7, titleTa: "மதுரைக்காஞ்சி", titleEn: "Maduraikanchi", poetTa: "மாங்குடி மருதனார்", poetEn: "Mangudi Maruthanar", lines: 782 },
            { id: 8, titleTa: "நெடுநல்வாடை", titleEn: "Nedunalvadai", poetTa: "நக்கீரர்", poetEn: "Nakkeerar", lines: 188 },
            { id: 9, titleTa: "குறிஞ்சிப்பாட்டு", titleEn: "Kurinjippattu", poetTa: "கபிலர்", poetEn: "Kapilar", lines: 261 },
            { id: 10, titleTa: "பட்டினப்பாலை", titleEn: "Pattinappalai", poetTa: "உருத்திரங்கண்ணனார்", poetEn: "Uruthirankannanar", lines: 301 }
        ];

        function loadSongs() {
            const grid = document.getElementById('songsGrid');
            grid.innerHTML = '';

            booksData.forEach(book => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.onclick = () => showLyrics(book.id);

                card.innerHTML = `
                    <div class="song-number">${book.id}</div>
                    <div class="song-title">${currentLang === 'ta' ? book.titleTa : book.titleEn}</div>
                    <div class="song-poet">${currentLang === 'ta' ? 'கவிஞர்' : 'Poet'}: ${currentLang === 'ta' ? book.poetTa : book.poetEn}</div>
                    <div class="song-meta">
                        <span class="meta-tag">${book.lines} ${currentLang === 'ta' ? 'வரிகள்' : 'lines'}</span>
                        <span class="meta-tag">📖 ${currentLang === 'ta' ? 'வரிகளைப் படியுங்கள்' : 'Read Lyrics'}</span>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        function showLyrics(bookId) {
            const book = booksData.find(b => b.id === bookId);
            const textData = pathuPattuTexts[bookId] || {};

            document.getElementById('modalTitle').textContent = currentLang === 'ta' ? book.titleTa : book.titleEn;
            document.getElementById('modalPoet').textContent = `${currentLang === 'ta' ? 'கவிஞர்' : 'Poet'}: ${currentLang === 'ta' ? book.poetTa : book.poetEn}`;

            const fullText = currentLang === 'ta' ? textData.fullTextTa : textData.fullTextEn;
            const sampleVerses = currentLang === 'ta' ? textData.sampleVersesTa : textData.sampleVersesEn;

            let content = '';

            // Sample verses
            if (sampleVerses && sampleVerses.length > 0) {
                content += `
                    <div class="lyrics-section">
                        <h3>📜 ${currentLang === 'ta' ? 'மாதிரி வரிகள்' : 'Sample Verses'}</h3>
                        ${sampleVerses.map((verse, index) => `
                            <div class="verse-item">
                                <span class="verse-number">${index + 1}</span>
                                <span>${verse}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // Full text
            if (fullText) {
                content += `
                    <div class="lyrics-section">
                        <h3>📖 ${currentLang === 'ta' ? 'முழு பாடல்' : 'Full Text'}</h3>
                        <div class="lyrics-text">${fullText}</div>
                    </div>
                `;
            }

            // Action buttons
            content += `
                <div class="action-buttons">
                    <button class="action-btn" onclick="printLyrics()">🖨️ ${currentLang === 'ta' ? 'அச்சிடு' : 'Print'}</button>
                    <button class="action-btn" onclick="copyLyrics()">📋 ${currentLang === 'ta' ? 'நகலெடு' : 'Copy'}</button>
                    <button class="action-btn" onclick="closeLyrics()">✕ ${currentLang === 'ta' ? 'மூடு' : 'Close'}</button>
                </div>
            `;

            document.getElementById('lyricsBody').innerHTML = content;
            document.getElementById('lyricsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLyrics() {
            document.getElementById('lyricsModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function switchLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            loadSongs();
        }

        function printLyrics() {
            window.print();
        }

        function copyLyrics() {
            const text = document.querySelector('.lyrics-text').textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert(currentLang === 'ta' ? 'வரிகள் நகலெடுக்கப்பட்டன!' : 'Lyrics copied!');
            });
        }

        // Initialize
        loadSongs();
    </script>
</body>

</html>
